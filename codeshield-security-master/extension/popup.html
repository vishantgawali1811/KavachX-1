<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeShield</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">

        <!-- Header -->
        <header class="popup-header">
            <div class="logo">
                <div class="logo-mark">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L3 7v5c0 5.25 3.75 10.16 9 11.25C17.25 22.16 21 17.25 21 12V7L12 2z"
                            fill="url(#shieldGrad)" />
                        <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="1.8" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <defs>
                            <linearGradient id="shieldGrad" x1="3" y1="2" x2="21" y2="23"
                                gradientUnits="userSpaceOnUse">
                                <stop stop-color="#6EE7B7" />
                                <stop offset="1" stop-color="#3B82F6" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">CodeShield</span>
            </div>
            <div class="status-pill" id="statusIndicator">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Active</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="popup-main">

            <!-- Stats Row -->
            <section class="stats-section">
                <div class="stat-card">
                    <div class="stat-number" id="secretsCount">0</div>
                    <div class="stat-label">Scanned</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-card">
                    <div class="stat-number" id="scansCount">0</div>
                    <div class="stat-label">Today</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-card">
                    <div class="stat-number accent-red" id="blockedCount">0</div>
                    <div class="stat-label">Blocked</div>
                </div>
            </section>

            <!-- Current Page Card -->
            <section class="page-card">
                <div class="page-card-inner">
                    <div class="page-info">
                        <div class="page-label">Current Site</div>
                        <div class="page-url" id="pageUrl">—</div>
                        <div class="page-status-badge" id="pageStatus">Scanning…</div>
                    </div>
                    <div class="page-actions">
                        <button class="btn btn-primary" id="scanBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.2" stroke-linecap="round">
                                <circle cx="11" cy="11" r="8" />
                                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                            </svg>
                            Scan
                        </button>
                        <button class="btn btn-ghost" id="restoreBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.2" stroke-linecap="round">
                                <polyline points="1 4 1 10 7 10" />
                                <path d="M3.51 15a9 9 0 1 0 .49-3.5" />
                            </svg>
                            Restore
                        </button>
                    </div>
                </div>
            </section>

            <!-- Detections List -->
            <section class="secrets-section" id="secretsSection" style="display: none;">
                <div class="section-header">
                    <span class="section-title">Detections</span>
                    <span class="badge-count" id="detectionCount">0</span>
                </div>
                <div class="secrets-list" id="secretsList"></div>
            </section>

            <!-- Protection Bar -->
            <section class="protection-section">
                <div class="protection-row">
                    <span class="protection-label">Protection</span>
                    <span class="protection-value" id="protectionLevel">High</span>
                </div>
                <div class="level-track">
                    <div class="level-fill" id="levelFill" style="width: 100%;"></div>
                </div>
                <div class="level-description" id="levelDescription">Full protection active</div>
            </section>

            <!-- Quick Actions Row -->
            <section class="quick-actions">
                <button class="qa-btn" id="toggleBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <path d="M18.36 6.64A9 9 0 1 1 5.64 6.64" />
                        <line x1="12" y1="2" x2="12" y2="12" />
                    </svg>
                    <span>Toggle</span>
                </button>
                <button class="qa-btn" id="settingsBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    <span>Settings</span>
                </button>
                <button class="qa-btn" id="exportBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    <span>Export</span>
                </button>
                <button class="qa-btn" id="helpBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                        <line x1="12" y1="17" x2="12.01" y2="17" />
                    </svg>
                    <span>Help</span>
                </button>
            </section>

        </main>

        <!-- Footer -->
        <footer class="popup-footer">
            <a href="#" id="reportIssue" class="footer-link">Report Issue</a>
            <a href="#" id="viewLogs" class="footer-link">Logs</a>
            <span class="version">v1.0.0</span>
        </footer>

    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="scan-ring"></div>
        <div class="loading-text">Scanning…</div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
